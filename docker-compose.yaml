name: anivartee
services:
  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --requirepass your_strong_password
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks: [default]

  user-service:
    build: ./server/user-service
    container_name: user-service
    ports:
      - "3001:3001"
    env_file: ./server/user-service/.env.docker
    environment:
      - NODE_ENV=development
    volumes:
      - ./server/user-service/src:/usr/src/app/src
      - /usr/src/app/node_modules
    depends_on:
      - redis
    networks: [default]

  points-service:
    build: ./server/points-service
    container_name: points-service
    ports:
      - "3004:3004"
    env_file: ./server/points-service/.env.docker
    environment:
      - NODE_ENV=development
    volumes:
      - ./server/points-service/src:/usr/src/app/src
      - /usr/src/app/node_modules
    depends_on:
      - user-service
      - redis
    networks: [default]

  post-service:
    build: ./server/post-service
    container_name: post-service
    ports:
      - "3002:3002"
    env_file: ./server/post-service/.env.docker
    environment:
      - NODE_ENV=development
    volumes:
      - ./server/post-service/src:/usr/src/app/src
      - /usr/src/app/node_modules
    depends_on:
      - user-service
      - points-service
      - redis
    networks: [default]

  payment-service:
    build: ./server/payment-service
    container_name: payment-service
    ports:
      - "3005:3005"
    env_file: ./server/payment-service/.env.docker
    environment:
      - NODE_ENV=development
    volumes:
      - ./server/payment-service/src:/usr/src/app/src
      - /usr/src/app/node_modules
    depends_on:
      - user-service
      - redis
    networks: [default]


